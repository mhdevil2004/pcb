services:
  - type: web
    name: pcb-defect-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -u main.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MODEL_WARM_ON_STARTUP
        value: "false"
      - key: MODEL_KEEPALIVE_SEC
        value: "180"
      - key: PREDICT_IN_SUBPROCESS
        value: "false"
      - key: PREDICT_SUBPROCESS_TIMEOUT_SEC
        value: "480"
      - key: SERVER_REQUEST_TIMEOUT_SEC
        value: "300"
      - key: MODEL_READY_TIMEOUT_SEC
        value: "240"
      - key: YOLO_CONFIG_DIR
        value: "/tmp/Ultralytics"
      - key: MAX_UPLOAD_BYTES
        value: "8388608"
      - key: MAX_INPUT_PIXELS
        value: "4000000"
      - key: MAX_IMAGE_EDGE
        value: "768"
      - key: MAX_IMAGE_SIZE
        value: "512"
      - key: PREDICT_CONCURRENCY
        value: "1"
      - key: MAX_DETECTIONS
        value: "60"
      - key: MAX_RESPONSE_IMAGE_EDGE
        value: "640"
      - key: RESPONSE_JPEG_QUALITY
        value: "50"
