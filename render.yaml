services:
  - type: web
    name: pcb-defect-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: YOLO_CONFIG_DIR
        value: "/tmp/Ultralytics"
      - key: MAX_UPLOAD_BYTES
        value: "8388608"
      - key: MAX_INPUT_PIXELS
        value: "4000000"
      - key: MAX_IMAGE_EDGE
        value: "1024"
      - key: MAX_IMAGE_SIZE
        value: "640"
      - key: PREDICT_CONCURRENCY
        value: "1"
      - key: MAX_DETECTIONS
        value: "60"
      - key: MAX_RESPONSE_IMAGE_EDGE
        value: "800"
      - key: RESPONSE_JPEG_QUALITY
        value: "60"
